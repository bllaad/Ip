name: IP Pool Update

on:
  schedule:
    - cron: "0 */3 * * *"  # 每3小时运行
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install requests

      - name: Run IP test
        run: python ip_test.py

      - name: Commit results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add good_ips.txt
          git commit -m "update ip pool" || echo "no changes"
          git push