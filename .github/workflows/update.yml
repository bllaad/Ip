name: Update Cloudflare IP Test

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4


    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"


    - name: Run CF speed test
      run: python cf_test.py


    - name: Commit results
      run: |
        git config --global user.name github-actions
        git config --global user.email actions@github.com

        git add *.txt history.json || true

        git commit -m "Auto update Cloudflare IP test results" || true

        git push